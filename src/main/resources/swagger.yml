openapi: 3.0.3
info:
  title: Aidea API
  description: |
    Aidea - AI 기반 기획 문서 협업 도구 API 명세서

    ## 인증 방식
    - OAuth2 소셜 로그인 (GitHub)
    - JWT HttpOnly Cookie (Access Token: 30분, Refresh Token: 14일)
    - 인증이 필요한 API는 브라우저가 access_token 쿠키를 자동으로 전송합니다.

    ## 공통 응답 형식
    ```json
    {
      "success": true,
      "code": null,
      "message": "성공 메시지",
      "data": { ... }
    }
    ```
  version: 1.0.0
  contact:
    name: Aidea

servers:
  - url: http://localhost:8080
    description: Local Development
  - url: https://api.aidea.com
    description: Production

tags:
  - name: Auth
    description: 인증 (소셜 로그인, 토큰 관리)
  - name: Teamspace

    description: 팀스페이스 생성, 조회, 관리
  - name: Member
    description: 멤버 조회, 초대, 추방, 초대 수락/취소
  - name: Document
    description: 문서 CRUD 및 내보내기
  - name: Feedback
    description: AI 피드백 요청 및 수락

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token
      description: "HttpOnly 쿠키로 전달되는 JWT Access Token. 브라우저가 자동으로 전송합니다."

  schemas:
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        code:
          type: string
          nullable: true
        message:
          type: string
          nullable: true
        data:
          type: object
          nullable: true

    UserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
          format: email
        name:
          type: string
        profileImageUrl:
          type: string
          nullable: true
        provider:
          type: string
          enum: [LOCAL, GITHUB, GOOGLE, KAKAO]

    TeamspaceCreateRequest:
      type: object
      required: [name, idea, documents]
      properties:
        name:
          type: string
          description: 팀스페이스 이름
          example: "Aidea 프로젝트"
        idea:
          type: string
          description: 아이디어 설명 (필수)
          example: "개발팀의 기획 문서 작성을 돕는 AI 기반 협업 도구"
        documents:
          type: array
          description: "생성할 문서 타입 목록 (IDEA는 필수, 해제 불가)"
          items:
            type: string
            enum: [IDEA, PLAN, USER_SCENARIO, API_SPEC, ERD]
          example: ["IDEA", "PLAN", "USER_SCENARIO", "API_SPEC", "ERD"]

    TeamspaceSummary:
      type: object
      properties:
        teamspaceId:
          type: string
        name:
          type: string
        memberCount:
          type: integer
        status:
          type: string
          enum: [CREATING, CREATED]
        createdAt:
          type: string
          format: date-time

    TeamspaceDetail:
      type: object
      properties:
        teamspaceId:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [CREATING, CREATED]
        documents:
          type: array
          items:
            $ref: '#/components/schemas/DocumentSummary'
        members:
          type: array
          items:
            $ref: '#/components/schemas/MemberInfo'
        createdAt:
          type: string
          format: date-time

    InviteRequest:
      type: object
      required: [emails]
      properties:
        emails:
          type: array
          description: "초대할 이메일 목록 (최대 8개)"
          items:
            type: string
            format: email
          maxItems: 8
          example: ["member1@company.com", "member2@company.com"]

    AcceptInvitationRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: 초대 토큰

    MemberInfo:
      type: object
      properties:
        userId:
          type: integer
          format: int64
          nullable: true
        name:
          type: string
          nullable: true
        email:
          type: string
          format: email
        role:
          type: string
          enum: [OWNER, MEMBER]
        status:
          type: string
          enum: [ACTIVE, PENDING]
        profileImageUrl:
          type: string
          nullable: true

    DocumentSummary:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [IDEA, PLAN, USER_SCENARIO, API_SPEC, ERD]
        title:
          type: string
        updatedAt:
          type: string
          format: date-time
        updatedBy:
          type: string
          nullable: true

    DocumentDetail:
      type: object
      properties:
        id:
          type: string
        teamspaceId:
          type: string
        type:
          type: string
          enum: [IDEA, PLAN, USER_SCENARIO, API_SPEC, ERD]
        title:
          type: string
        yjsBinary:
          type: string
          format: byte
          description: "Base64 인코딩된 Yjs binary"
        updatedAt:
          type: string
          format: date-time
        updatedBy:
          type: string
          nullable: true

    DocumentCreateRequest:
      type: object
      required: [teamspaceId, type]
      properties:
        teamspaceId:
          type: string
        type:
          type: string
          enum: [IDEA, PLAN, USER_SCENARIO, API_SPEC, ERD]
        title:
          type: string
          description: "문서 제목 (미입력 시 type 기반 기본값)"

    TeamspaceUpdateRequest:
      type: object
      properties:
        name:
          type: string
          description: 팀스페이스 이름

    DocumentUpdateRequest:
      type: object
      properties:
        title:
          type: string

    FeedbackRequest:
      type: object
      properties:
        additionalRequest:
          type: string
          nullable: true
          description: "추가 요청사항 (선택)"
          example: "서비스 목적을 더 구체적으로 보완해주세요"

    FeedbackResponse:
      type: object
      properties:
        feedbackId:
          type: string
        status:
          type: string
          enum: [PENDING, DONE, ACCEPTED]

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        code:
          type: string
        message:
          type: string

security:
  - cookieAuth: []

paths:
  # ===== Auth =====
  /api/oauth2/authorize/github:
    get:
      tags: [Auth]
      summary: GitHub 로그인 시작
      description: |
        GitHub OAuth 인증 페이지로 리다이렉트합니다.

        **프론트 사용법:**
        로그인 버튼 클릭 시 이 URL로 페이지를 이동시킵니다.
        ```
        window.location.href = 'http://localhost:8080/api/oauth2/authorize/github';
        ```
      security: []
      responses:
        '302':
          description: GitHub OAuth 인증 페이지로 리다이렉트
          headers:
            Location:
              schema:
                type: string
              example: "https://github.com/login/oauth/authorize?client_id=..."

  /api/oauth2/callback/github:
    get:
      tags: [Auth]
      summary: GitHub OAuth 콜백 (직접 호출 X)
      description: |
        GitHub 인증 완료 후 GitHub이 자동으로 호출하는 콜백 URL입니다.
        프론트에서 직접 호출하지 않습니다.

        **서버 동작:**
        1. GitHub에서 전달받은 code로 GitHub access token 교환
        2. GitHub 사용자 정보 조회
        3. JWT 생성 후 httpOnly 쿠키 설정 (URL에 토큰 노출 없음):
           - `access_token`: HttpOnly; Secure; SameSite=Lax; Max-Age=1800 (30분)
           - `refresh_token`: HttpOnly; Secure; SameSite=Lax; Max-Age=1209600 (14일)
        4. 프론트로 리다이렉트: `http://localhost:5173/`
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: GitHub에서 전달하는 인증 코드
      responses:
        '302':
          description: 인증 성공 - 프론트엔드 홈으로 리다이렉트
          headers:
            Location:
              schema:
                type: string
              example: "http://localhost:5173/"
            Set-Cookie:
              schema:
                type: string
              examples:
                accessToken:
                  value: "access_token=eyJ...; HttpOnly; Secure; SameSite=Lax; Max-Age=1800"
                refreshToken:
                  value: "refresh_token=eyJ...; HttpOnly; Secure; SameSite=Lax; Max-Age=1209600"

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: 토큰 갱신
      description: |
        refresh_token 쿠키를 사용하여 새로운 access_token을 발급받습니다.
        요청 바디 없이 브라우저가 refresh_token 쿠키를 자동으로 전송합니다.
      security: []
      responses:
        '200':
          description: 토큰 갱신 성공
          headers:
            Set-Cookie:
              schema:
                type: string
              example: "access_token=eyJ...; HttpOnly; Secure; SameSite=Lax; Max-Age=1800"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                success: true
                message: "토큰이 갱신되었습니다."
        '401':
          description: 유효하지 않은 토큰
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidToken:
                  value:
                    success: false
                    code: "AUTH_003"
                    message: "유효하지 않은 토큰입니다."
                expiredToken:
                  value:
                    success: false
                    code: "AUTH_004"
                    message: "만료된 토큰입니다."

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: 로그아웃
      description: access_token, refresh_token 쿠키를 만료시킵니다.
      responses:
        '200':
          description: 로그아웃 성공
          headers:
            Set-Cookie:
              schema:
                type: string
              examples:
                clearAccessToken:
                  value: "access_token=; Max-Age=0"
                clearRefreshToken:
                  value: "refresh_token=; Max-Age=0"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                success: true
                message: "로그아웃 성공"

  /api/auth/me:
    get:
      tags: [Auth]
      summary: 내 정보 조회
      description: |
        현재 로그인된 사용자 정보를 조회합니다.
        비로그인 상태 확인용으로도 사용합니다 (401 응답으로 판단).
      responses:
        '200':
          description: 사용자 정보
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserResponse'
        '401':
          description: 비로그인 상태
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ===== Teamspace =====
  /api/teamspaces:
    post:
      tags: [Teamspace]
      summary: 팀스페이스 생성
      description: |
        새로운 팀스페이스를 생성합니다.

        서버는 팀스페이스를 생성하고, 백그라운드에서 Gemini API를 호출하여
        입력된 아이디어와 선택된 문서 목록을 기반으로 각 문서의 AI 초안 생성을 시작합니다.
        이 시점의 팀스페이스 status는 `CREATING`입니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamspaceCreateRequest'
      responses:
        '201':
          description: 팀스페이스 생성 시작
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          teamspaceId:
                            type: string
              example:
                success: true
                message: "팀스페이스가 생성되었습니다."
                data:
                  teamspaceId: "ts_abc123"

    get:
      tags: [Teamspace]
      summary: 팀스페이스 목록 조회
      description: 현재 사용자가 소속된 모든 팀스페이스 목록을 조회합니다.
      responses:
        '200':
          description: 팀스페이스 목록
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/TeamspaceSummary'

  /api/teamspaces/{teamspaceId}:
    get:
      tags: [Teamspace]
      summary: 팀스페이스 상세 조회
      description: 특정 팀스페이스의 상세 정보(문서 목록, 멤버 목록, 상태)를 조회합니다.
      parameters:
        - name: teamspaceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 팀스페이스 상세 정보
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TeamspaceDetail'
        '404':
          description: 팀스페이스 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                code: "TEAMSPACE_001"
                message: "팀스페이스를 찾을 수 없습니다."

    put:
      tags: [Teamspace]
      summary: 팀스페이스 이름 수정
      description: 팀스페이스 이름을 수정합니다. OWNER 권한이 필요합니다.
      parameters:
        - name: teamspaceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamspaceUpdateRequest'
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          teamspaceId:
                            type: string
                          name:
                            type: string
                          status:
                            type: string
                            enum: [CREATING, CREATED]
                          createdAt:
                            type: string
                            format: date-time
              example:
                success: true
                message: "팀스페이스 이름이 수정되었습니다."
                data:
                  teamspaceId: "ts_abc123"
                  name: "수정된 팀스페이스 이름"
        '404':
          description: 팀스페이스 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Teamspace]
      summary: 팀스페이스 삭제
      description: 팀스페이스를 삭제합니다. OWNER 권한이 필요합니다.
      parameters:
        - name: teamspaceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 삭제 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                success: true
                message: "팀스페이스가 삭제되었습니다."
        '404':
          description: 팀스페이스 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ===== Member =====
  /api/teamspaces/{teamspaceId}/members:
    get:
      tags: [Member]
      summary: 멤버 목록 조회
      description: |
        팀스페이스의 전체 멤버 목록을 조회합니다.
        멤버 관리 모달에서 사용됩니다.
      parameters:
        - name: teamspaceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 멤버 목록
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/MemberInfo'

  /api/teamspaces/{teamspaceId}/members/invite:
    post:
      tags: [Member]
      summary: 멤버 추가 초대 (멤버 관리 모달)
      description: 멤버 관리 모달에서 새 멤버를 추가 초대합니다.
      parameters:
        - name: teamspaceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: "newmember@company.com"
      responses:
        '200':
          description: 초대 발송
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                success: true
                message: "초대가 발송되었습니다."

  /api/teamspaces/{teamspaceId}/members/{memberId}:
    delete:
      tags: [Member]
      summary: 멤버 추방
      description: 팀스페이스에서 멤버를 추방합니다. OWNER 권한이 필요합니다.
      parameters:
        - name: teamspaceId
          in: path
          required: true
          schema:
            type: string
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 추방 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                success: true
                message: "멤버가 추방되었습니다."

  /api/invitations/accept:
    post:
      tags: [Member]
      summary: 초대 수락
      description: |
        초대 토큰을 사용하여 팀스페이스 초대를 수락합니다.

        **케이스별 흐름:**

        **Case 1 - 이미 로그인된 유저:**
        1. 이메일 링크 클릭 → `{frontend}/invite?token=abc123`
        2. 프론트: `/api/auth/me` 호출 → 200
        3. `POST /api/invitations/accept { token }` 호출
        4. 완료 → `/teamspaces/{teamspaceId}`로 이동

        **Case 2/3 - 미로그인 유저 (신규/기존):**
        1. 이메일 링크 클릭 → `{frontend}/invite?token=abc123`
        2. 프론트: `/api/auth/me` 호출 → 401
        3. 프론트: `pending_invite_token=abc123` 쿠키 저장 후 GitHub OAuth로 이동
        4. OAuth 완료 → 서버가 `pending_invite_token` 쿠키 감지, 자동 수락 처리
        5. 완료 → `/teamspaces/{teamspaceId}`로 리다이렉트

        **검증 순서:**
        1. token으로 Invitation 조회 (없으면 INVITATION_NOT_FOUND)
        2. status == PENDING 확인 (아니면 INVITATION_NOT_FOUND)
        3. expiresAt > now() 확인 (만료 시 INVITATION_EXPIRED)
        4. 이미 멤버인지 확인 (중복 시 ALREADY_MEMBER)
        5. TeamspaceMember 등록 (role = invitation.role)
        6. Invitation.status → ACCEPTED
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptInvitationRequest'
      responses:
        '200':
          description: 초대 수락 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          teamspaceId:
                            type: string
              example:
                success: true
                message: "팀스페이스에 참여하였습니다."
                data:
                  teamspaceId: "ts_abc123"
        '400':
          description: 유효하지 않거나 만료된 초대 토큰
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidToken:
                  value:
                    success: false
                    code: "INVITATION_NOT_FOUND"
                    message: "유효하지 않거나 이미 사용된 초대입니다."
                expiredToken:
                  value:
                    success: false
                    code: "INVITATION_EXPIRED"
                    message: "만료된 초대입니다."
                alreadyMember:
                  value:
                    success: false
                    code: "ALREADY_MEMBER"
                    message: "이미 팀스페이스의 멤버입니다."
        '401':
          description: 비로그인 상태
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/teamspaces/{teamspaceId}/invitations:
    post:
      tags: [Member]
      summary: 팀원 일괄 초대 (팀스페이스 생성 후)
      description: |
        팀스페이스 생성 후 최대 8명의 팀원을 이메일로 초대합니다.
        각 이메일로 초대 링크가 발송되며, 이미 멤버인 경우 해당 이메일은 건너뜁니다.
      parameters:
        - name: teamspaceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteRequest'
      responses:
        '200':
          description: 초대 발송 완료
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            email:
                              type: string
                              format: email
                            status:
                              type: string
                              enum: [SENT, ALREADY_MEMBER]
              example:
                success: true
                message: "초대가 발송되었습니다."
                data:
                  - email: "member1@company.com"
                    status: "SENT"
                  - email: "member2@company.com"
                    status: "ALREADY_MEMBER"
        '400':
          description: 잘못된 요청 (이메일 8개 초과 등)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                code: "INVITATION_001"
                message: "한 번에 최대 8명까지 초대할 수 있습니다."
        '403':
          description: 권한 없음 (OWNER만 초대 가능)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 팀스페이스 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/teamspaces/{teamspaceId}/invitations/{invitationId}:
    delete:
      tags: [Member]
      summary: 초대 취소
      description: 대기 중인 초대를 취소합니다. OWNER 권한이 필요합니다.
      parameters:
        - name: teamspaceId
          in: path
          required: true
          schema:
            type: string
        - name: invitationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 초대 취소
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                success: true
                message: "초대가 취소되었습니다."

  # ===== Document =====
  /api/documents:
    get:
      tags: [Document]
      summary: 문서 목록 조회
      description: 팀스페이스 내 전체 문서 목록을 조회합니다.
      parameters:
        - name: teamspaceId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 문서 목록
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/DocumentSummary'

    post:
      tags: [Document]
      summary: 문서 추가 생성
      description: 팀스페이스에 새로운 문서를 추가합니다. 사이드바의 '+ 추가하기' 버튼에서 사용됩니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentCreateRequest'
      responses:
        '201':
          description: 문서 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                success: true
                message: "문서가 생성되었습니다."
                data:
                  id: "doc_005"
                  type: "ERD"
                  title: "ERD"
                  createdAt: "2026-04-24T11:00:00"

  /api/documents/{documentId}:
    get:
      tags: [Document]
      summary: 문서 상세 조회
      description: |
        특정 문서의 상세 정보와 Yjs 스냅샷을 조회합니다.
        실시간 편집 시에는 WebSocket을 통해 Yjs binary를 주고받습니다.
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 문서 상세
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DocumentDetail'
        '404':
          description: 문서 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                code: "DOCUMENT_001"
                message: "문서를 찾을 수 없습니다."

    patch:
      tags: [Document]
      summary: 문서 제목 수정
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentUpdateRequest'
      responses:
        '200':
          description: 제목 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                success: true
                message: "문서 제목이 수정되었습니다."
                data:
                  id: "doc_002"
                  title: "수정된 제목"

    delete:
      tags: [Document]
      summary: 문서 삭제
      description: "문서를 삭제합니다. IDEA 타입 문서는 삭제할 수 없습니다."
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 문서 삭제 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                success: true
                message: "문서가 삭제되었습니다."
        '400':
          description: IDEA 문서 삭제 불가
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                code: "DOCUMENT_002"
                message: "아이디어 문서는 삭제할 수 없습니다."

  /api/documents/{documentId}/export:
    get:
      tags: [Document]
      summary: 문서 내보내기
      description: 문서를 지정된 형식으로 내보냅니다.
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
        - name: format
          in: query
          required: true
          schema:
            type: string
            enum: [md, pdf]
          description: "내보내기 형식"
      responses:
        '200':
          description: 파일 다운로드
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  # ===== Feedback =====
  /api/documents/{documentId}/feedback:
    post:
      tags: [Feedback]
      summary: AI 피드백 요청
      description: |
        특정 문서에 대해 AI 피드백을 요청합니다.

        **서버 동작:**
        1. 해당 문서와 IDEA 문서의 yjsBinary를 DB에서 조회
        2. feedbacks 테이블에 INSERT (status: PENDING)
        3. 202 Accepted 응답 반환
        4. Gemini API 호출
        5. 결과를 feedbacks.yjsBinary에 저장, status → DONE
        6. WebSocket으로 feedback:ready 이벤트 브로드캐스트

        피드백 요청 시 해당 문서는 lockedDocuments에 추가되어 편집이 제한됩니다.
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackRequest'
      responses:
        '202':
          description: 피드백 요청 접수
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/FeedbackResponse'
              example:
                success: true
                message: "AI 피드백을 생성하고 있습니다."
                data:
                  feedbackId: "fb_001"
                  status: "PENDING"

  /api/feedbacks/{feedbackId}/accept:
    post:
      tags: [Feedback]
      summary: AI 피드백 버전 수락
      description: |
        AI가 생성한 피드백 버전을 수락하여 문서에 적용합니다.

        **서버 동작:**
        1. 피드백의 revisedYjsBinary 조회
        2. 문서의 yjsBinary를 afterSnapshotBinary로 교체
        3. WebSocket으로 versionApplied 이벤트 브로드캐스트
        4. feedbacks status → ACCEPTED
        5. DocumentLock 해제
      parameters:
        - name: feedbackId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 피드백 수락 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                success: true
                message: "피드백이 적용되었습니다."
                data:
                  documentId: "doc_001"
                  yjsBinary: "base64_encoded_after_snapshot..."

