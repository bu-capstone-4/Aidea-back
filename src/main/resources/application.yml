spring:
  application:
    name: aidea

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/aidea_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: 60000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: false
    open-in-view: false

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:clientid}
            client-secret: ${GITHUB_CLIENT_SECRET:secret}
            scope: read:user, user:email, repo, project

  # 초대 이메일 관련 설정
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${smtpEmail}
    password: ${smtpPassword}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
jwt:
  secret: ${JWT_SECRET:jwtsecret}
  access-token-expiry: 1800000
  refresh-token-expiry: 1209600000

server:
  port: 8080

frontend:
  url: ${FRONTEND_URL:http://localhost:5173}

app:
  cookie:
    secure: ${COOKIE_SECURE:false}
  
  # 초대 이메일 관련 설정
  base-url: http://localhost:8080
  invitation:
    expiry-hours: 48

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

# 로그 레벨은 logback-spring.xml 의 springProfile 블록에서 관리합니다.