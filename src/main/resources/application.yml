spring:
  application:
    name: aidea

  datasource:
    url: jdbc:h2:mem:yjsdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 1234

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        "[format_sql]": true

  h2:
    console:
      enabled: true
      path: /h2-console

  security:
    user:
      name: admin
      password: 1234

server:
  port: 8080