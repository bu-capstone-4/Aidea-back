spring:
  application:
    name: aidea

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/aidea_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: 60000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:create}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: ${SHOW_SQL:true}
    open-in-view: false

  # --- OAuth2 클라이언트 설정 ---
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:clientid}
            client-secret: ${GITHUB_CLIENT_SECRET:secret}
            scope: read:user, user:email, repo, project

# --- JWT 설정 ---
jwt:
  secret: ${JWT_SECRET:jwtsecret}
  access-token-expiry: 1800000      # 30분 (ms)
  refresh-token-expiry: 1209600000  # 14일 (ms)

# --- 서버 설정 ---
server:
  port: 8080

# --- 프론트엔드 URL (OAuth 리다이렉트) ---
frontend:
  url: ${FRONTEND_URL:http://localhost:5173}

# --- 쿠키 설정 ---
app:
  cookie:
    secure: ${COOKIE_SECURE:false}

# --- Actuator ---
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# --- Swagger ---
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

# --- 로깅 ---
logging:
  level:
    com.aidea.idea: DEBUG
    org.springframework.security: DEBUG