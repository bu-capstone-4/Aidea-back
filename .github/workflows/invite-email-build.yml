name: Invite Email Build Check

on:
  pull_request:
    branches: [ main, hotfix/* ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build with Gradle (skip tests)
        run: |
          chmod +x gradlew
          ./gradlew build -x test

      - name: Discord 성공 알림
        if: success()
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "✅ CI 빌드 성공",
                "description": "PR #'"${{ github.event.pull_request.number }}"' — '"${{ github.head_ref }}"' → '"${{ github.base_ref }}"'",
                "color": 3066993
              }]
            }'

      - name: Discord 실패 알림
        if: failure()
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "❌ CI 빌드 실패",
                "description": "PR #'"${{ github.event.pull_request.number }}"' — '"${{ github.head_ref }}"' → '"${{ github.base_ref }}"'",
                "color": 15158332
              }]
            }'
