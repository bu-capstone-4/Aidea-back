# deploy.sh가 이 줄의 upstream 서버명을 교체합니다 (spring-blue ↔ spring-green)
upstream spring-app {
    server spring-blue:8080;
}

# HTTP → HTTPS 리다이렉트 + certbot 인증 경로
server {
    listen 80;
    server_name aidea-bu.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name aidea-bu.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/aidea-bu.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aidea-bu.duckdns.org/privkey.pem;

    location / {
        proxy_pass         http://spring-app;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
