# HTTP → HTTPS 리다이렉트 + certbot 인증 경로
server {
    listen 80;
    server_name aidea-bu.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name aidea-bu.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/aidea-bu.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aidea-bu.duckdns.org/privkey.pem;

    location /ws/ {
        resolver 127.0.0.11 valid=10s;
        set $spring_upstream spring-blue:8080;

        proxy_pass         http://$spring_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        # deploy.sh가 이 줄의 호스트명을 교체합니다 (spring-blue ↔ spring-green)
        # resolver로 런타임 DNS 조회 → upstream 컨테이너가 없어도 nginx가 시작 가능
        resolver 127.0.0.11 valid=10s;
        set $spring_upstream spring-blue:8080;

        proxy_pass         http://$spring_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
